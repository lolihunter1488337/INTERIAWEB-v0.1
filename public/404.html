<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>404 — INTERIA!</title>
<style>
  *{margin:0;box-sizing:border-box}
  body{background:#09090b;color:#fafafa;min-height:100vh;display:flex;align-items:center;justify-content:center;
    font-family:ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;text-align:center;padding:24px;overflow:hidden}
  .wrap{position:relative;z-index:2}
  img{width:84px;margin:0 auto 28px;filter:drop-shadow(0 0 30px rgba(255,255,255,.25));animation:f 6s ease-in-out infinite}
  @keyframes f{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
  h1{font-size:clamp(90px,26vw,260px);font-weight:800;letter-spacing:-.05em;line-height:.85;
    background:linear-gradient(180deg,#fff,#9a9ea8 55%,#fff);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
  p{color:#71717a;margin-top:14px;letter-spacing:.04em;text-transform:uppercase;font-size:13px;font-family:ui-monospace,monospace}
  a{display:inline-block;margin-top:32px;padding:14px 30px;border-radius:999px;background:#fafafa;color:#09090b;
    text-decoration:none;font-weight:700;font-size:14px;transition:transform .2s}
  a:hover{transform:translateY(-2px)}
  .grid{position:fixed;inset:0;z-index:1;opacity:.4;
    background-image:linear-gradient(rgba(255,255,255,.05) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.05) 1px,transparent 1px);
    background-size:64px 64px;-webkit-mask-image:radial-gradient(circle at 50% 45%,#000,transparent 70%);mask-image:radial-gradient(circle at 50% 45%,#000,transparent 70%)}
</style>
</head>
<body>
<div class="grid"></div>
<div class="wrap">
  <img src="/logo.png" alt="INTERIA!" onerror="this.style.display='none'" />
  <h1>404</h1>
  <p>Эта страница ушла в андеграунд</p>
  <a href="/">← Вернуться на главную</a>
</div>
</body>
</html>
